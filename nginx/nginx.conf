events {}

http {
    server{
        listen 80;
        client_max_body_size 500M;
        location /api/videos {
            proxy_pass http://backend:8080;
            proxy_set_header HOST $host;
            proxy_set_header X-Real-IP $remote_addr;

            proxy_read_timeout 600s;
            proxy_send_timeout 600s;
        }

        location /media/ {
            proxy_pass http://minio:9000/;
        }
    }
}
