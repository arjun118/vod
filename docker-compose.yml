# docker run -d --name minio -p 9000:9000 -p 9001:9001 -e MINIO_ROOT_USER=adminpass -e MINIO_ROOT_PASSWORD=adminpass -v ~/minio-data:/data quay.io/minio/minio server /data --console-address ":9001"

services:
  minio:
    image: quay.io/minio/minio
    container_name: minio
    restart: always
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: adminpass
      MINIO_ROOT_PASSWORD: adminpass
    command: server --console-address ":9001" /data
    volumes:
      - ~/minio-data:/data
  nginx:
    image: nginx:latest
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - backend
      - minio
  backend:
    build:
      context: .
      dockerfile: internal/Dockerfile
    depends_on:
      - minio
