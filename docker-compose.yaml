version: "3.8"

services:
  minio:
    image: minio/minio:latest
    container_name: go-minio
    restart: always
    ports:
      - "9000:9000"
      - "9090:9090"
    environment:
      MINIO_ROOT_USER: miniopass
      MINIO_ROOT_PASSWORD: miniopass
    command: server --console-address ":9090" /data
